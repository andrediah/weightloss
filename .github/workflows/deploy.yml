name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore WeightLossTracker.slnx -r linux-x64

      - name: Run tests
        run: dotnet test WeightLossTracker.Tests/WeightLossTracker.Tests.csproj --configuration Release --no-restore --logger "console;verbosity=normal"

      - name: Publish self-contained linux-x64 binary
        run: dotnet publish WeightLossTracker/WeightLossTracker.csproj -c Release -r linux-x64 --self-contained true --no-restore -o ./publish

      - name: Archive published output
        run: tar -czf publish.tar.gz -C ./publish .

      - name: Test SSH connectivity
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: echo "SSH connection successful as $(whoami)"

      - name: Copy archive to Droplet
        run: |
          echo "${{ secrets.DO_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            ${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }} \
            "cat > /tmp/publish.tar.gz" < publish.tar.gz
          rm /tmp/deploy_key

      - name: Extract and restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            tar -xzf /tmp/publish.tar.gz -C /opt/weightloss
            rm /tmp/publish.tar.gz
            chmod +x /opt/weightloss/WeightLossTracker
            sudo /usr/bin/systemctl restart weightloss.service
            sleep 8
            if ! sudo /usr/bin/systemctl is-active --quiet weightloss.service; then
              sudo /usr/bin/systemctl status weightloss.service --no-pager
              exit 1
            fi
