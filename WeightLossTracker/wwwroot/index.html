<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weight Loss Tracker</title>

  <!-- Tailwind CDN with class-based dark mode -->
  <!-- tailwind.config covers v3 CDN; the style block below covers v4 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
  <!-- Tailwind v4: re-declare dark: variant as class-based (ignored by v3) -->
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* ─── Design tokens (ux-standards.md) ─────────────────────────────────── */
    :root {
      --color-surface-primary:   #FFFFFF;
      --color-surface-secondary: #F5F5F5;
      --color-text-primary:      #1A1A1A;
      --color-text-secondary:    #404040;
      --color-text-disabled:     #6C6C6C;
      --color-border-default:    #D4D4D4;
      --color-border-focus:      #0066CC;
      --color-feedback-error:    #B71C1C;
      --color-feedback-success:  #155724;
      --color-feedback-warning:  #8A6D00;

      --spacing-xs:  4px;
      --spacing-sm:  8px;
      --spacing-md:  16px;
      --spacing-lg:  24px;
      --spacing-xl:  32px;
      --spacing-2xl: 48px;

      --radius-sm:   4px;
      --radius-md:   8px;
      --radius-lg:   16px;
      --radius-full: 9999px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-surface-primary:   #121212;
        --color-surface-secondary: #1E1E1E;
        --color-text-primary:      #FAFAFA;
        --color-text-secondary:    #C7C7C7;
        --color-text-disabled:     #757575;
        --color-border-default:    #383838;
        --color-border-focus:      #60A0FF;
        --color-feedback-error:    #EF9A9A;
        --color-feedback-success:  #A5D6A7;
        --color-feedback-warning:  #FFE082;
      }
    }

    [data-theme="dark"] {
      --color-surface-primary:   #121212;
      --color-surface-secondary: #1E1E1E;
      --color-text-primary:      #FAFAFA;
      --color-text-secondary:    #C7C7C7;
      --color-text-disabled:     #757575;
      --color-border-default:    #383838;
      --color-border-focus:      #60A0FF;
      --color-feedback-error:    #EF9A9A;
      --color-feedback-success:  #A5D6A7;
      --color-feedback-warning:  #FFE082;
    }

    [data-theme="light"] {
      --color-surface-primary:   #FFFFFF;
      --color-surface-secondary: #F5F5F5;
      --color-text-primary:      #1A1A1A;
      --color-text-secondary:    #404040;
      --color-text-disabled:     #6C6C6C;
      --color-border-default:    #D4D4D4;
      --color-border-focus:      #0066CC;
      --color-feedback-error:    #B71C1C;
      --color-feedback-success:  #155724;
      --color-feedback-warning:  #8A6D00;
    }

    /* ─── Mobile bottom-tab active state ──────────────────────────────────── */
    [data-mobile-nav] { border-top: 2px solid transparent; }
    [data-mobile-nav].mobile-tab-active { border-top-color: #a5b4fc; color: #ffffff; }

    /* ─── Reduced motion ───────────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ─── View transitions ─────────────────────────────────────────────────── */
    #view-root { animation: fadeIn 0.15s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: none; }
    }

    /* ─── Scrollbar ────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark ::-webkit-scrollbar-track { background: #1e293b; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }

    /* ─── Prose (markdown renderer output) ────────────────────────────────── */
    .prose ul { list-style: disc; padding-left: 1.25rem; }
    .prose h2 { color: #4f46e5; font-weight: 700; font-size: 1.1rem; margin-top: 1rem; }
    .prose h3 { font-weight: 600; margin-top: 0.75rem; }
    .prose li { margin-bottom: 0.25rem; }
    .prose p  { margin-bottom: 0.5rem; }
    .dark .prose h2 { color: #818cf8; }
  </style>
</head>
<body class="h-full bg-gray-100 dark:bg-gray-900 flex flex-col md:flex-row transition-colors duration-200">

  <!-- Skip navigation (accessibility) -->
  <a href="#main-content"
     class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-50 focus:bg-indigo-600 focus:text-white focus:px-4 focus:py-2 focus:rounded-lg focus:text-sm focus:font-medium">
    Skip to main content

  <!-- Mobile top header (hidden on md+) -->

      <line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    <span class="text-white font-bold text-base leading-tight">
      Weight Loss <span class="text-indigo-300 font-normal text-sm">Tracker</span>
    </span>
    <span id="mobile-username" class="text-indigo-300 text-xs ml-auto mr-2 hidden sm:block"></span>
    <!-- Dark mode toggle for mobile -->

           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg data-sun class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>

        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>

    </button>
  </header>

    <!-- App name -->

        </svg>
        Weight Log

      <button data-nav="exercise" onclick="navigate('exercise')" role="listitem"

        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/>
          <line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
        Exercise
      </button>

      <button data-nav="meals" onclick="navigate('meals')" role="listitem"
              aria-label="Meal log"
              class="w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-3 text-indigo-100 hover:bg-indigo-700 dark:hover:bg-indigo-800 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-1 focus:ring-offset-indigo-900 min-h-[44px]">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/>
        </svg>
        Meals

      <button data-nav="history" onclick="navigate('history')" role="listitem"
              aria-label="AI history"
              class="w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-3 text-indigo-100 hover:bg-indigo-700 dark:hover:bg-indigo-800 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-1 focus:ring-offset-indigo-900 min-h-[44px]">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4l3 3"/>
        </svg>
        AI History
      </button>

      <button data-nav="profile" onclick="navigate('profile')" role="listitem"
              aria-label="Profile"
              class="w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-3 text-indigo-100 hover:bg-indigo-700 dark:hover:bg-indigo-800 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-1 focus:ring-offset-indigo-900 min-h-[44px]">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"

    <button data-mobile-nav="dashboard" onclick="navigate('dashboard')"

  <!-- Login view (shown when unauthenticated) -->
  <div id="login-view" class="hidden fixed inset-0 z-50 bg-gray-100 dark:bg-gray-900 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg w-full max-w-sm p-8">
      <div class="flex items-center gap-3 mb-8">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" class="text-indigo-500" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        <h1 class="text-xl font-bold text-gray-800 dark:text-gray-100">Weight Loss Tracker</h1>
      </div>

      <div id="login-error"></div>

      <form id="login-form" class="space-y-4" novalidate>
        <div>
          <label for="login-username" class="block text-sm text-gray-600 dark:text-gray-300 mb-1">
            Username
          </label>
          <input id="login-username" type="text" autocomplete="username" required
                 class="border dark:border-gray-600 rounded-lg px-3 py-2 w-full bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                 placeholder="your username">
        </div>
        <div>
          <label for="login-password" class="block text-sm text-gray-600 dark:text-gray-300 mb-1">
            Password
          </label>
          <input id="login-password" type="password" autocomplete="current-password" required
                 class="border dark:border-gray-600 rounded-lg px-3 py-2 w-full bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                 placeholder="••••••••">
        </div>
        <button type="submit" id="login-btn"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-medium transition-colors w-full min-h-[44px]">
          Log in
        </button>
      </form>
    </div>
  </div>

  <script src="/js/api.js?v=3"></script>
  <script src="/js/app.js?v=3"></script>
</body>
</html>
